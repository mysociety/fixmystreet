<p>Use this service to:</p>
<ul>
  <li>report a missed clinical waste collection</li>
</ul>

<h3>Before you start</h3>
<p>You need to provide the following information:</p>
<ul>
  <li>the number of clinical waste bags that need to be collected</li>
  <li>where the bags will be</li>
  <li>your name, address and contact information</li>
</ul>
