<div class="pin-legend pin-legend--desktop">
    <button type="button" class="pin-legend__preview js-pin-legend-desktop-toggle" aria-expanded="false" aria-controls="pin-legend-panel-desktop">
        <span class="visuallyhidden">[% loc('Show map pin key') %]</span>
        <img src="/i/pins/yellow/pin.png" alt="">
        <img src="/i/pins/green/pin.png" alt="">
        <img src="/i/pins/bromley/green/pin.png" alt="">
    </button>
    <div id="pin-legend-panel-desktop" class="pin-legend__panel" aria-labelledby="pin-legend-heading-desktop">
        <div class="pin-legend__header">
            <h2 id="pin-legend-heading-desktop" class="pin-legend__heading">[% loc('Map pin key') %]</h2>
            <button type="button" class="pin-legend__close js-pin-legend-desktop-close" aria-label="[% loc('Close map pin key') %]">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>
        <ul class="pin-legend__list">
            [% FOR colour IN c.cobrand.pin_colour_key %]
                <li class="pin-legend__item">
                    <img src='/i/pins/[% colour.0 %]/mini.png' alt="[% colour.0 %]"/>
                    <span>[% loc( colour.1 ) %]</span>
                </li>
            [% END %]
        </ul>
    </div>
</div>
